; Anti-Rage Doorbell — two nodes, one project.
;   door_panel   : Arduino Nano ESP32 (ESP32-S3) — buttons, sound, screen, sleep, mic
;   indoor_chime : ESP8266             — receives doorbell + voice, plays them
; Shared code lives in include/ (config.h, protocol.h). Each env compiles only its
; own src/ subfolder via build_src_filter.

[platformio]
default_envs = door_panel

[env]
framework = arduino
monitor_speed = 115200

[env:door_panel]
platform = espressif32
board = arduino_nano_esp32
build_src_filter = +<door_panel/>
; Force raw-GPIO numbering ("By GPIO number") so pinMode/digitalRead and the ext1
; deep-sleep mask agree. Without this the Nano ESP32 remaps Dx<->GPIO and the button
; pins in config.h would not match the wake mask. See WIRING.md.
build_flags = -DBOARD_USES_HW_GPIO_NUMBERS
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11

; Needs the ESP8266 platform first:  pio pkg install -e indoor_chime
[env:indoor_chime]
platform = espressif8266
board = nodemcuv2
build_src_filter = +<indoor_chime/>

; ============================================================================
;  DIAGNOSTICS — one component per env. See TESTING.md for the run order.
;  Flash a single test:  pio run -e diag_<name> -t upload -t monitor
; ============================================================================
[esp32_diag]
platform = espressif32
board = arduino_nano_esp32
build_flags = -DBOARD_USES_HW_GPIO_NUMBERS

[esp8266_diag]
platform = espressif8266
board = nodemcuv2

[env:diag_button]
extends = esp32_diag
build_src_filter = +<diag/button/>

[env:diag_i2c_scan]
extends = esp32_diag
build_src_filter = +<diag/i2c_scan/>

[env:diag_oled]
extends = esp32_diag
build_src_filter = +<diag/oled/>
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11

[env:diag_buzzer]
extends = esp32_diag
build_src_filter = +<diag/buzzer/>

[env:diag_sleep_wake]
extends = esp32_diag
build_src_filter = +<diag/sleep_wake/>

[env:diag_espnow_tx]
extends = esp32_diag
build_src_filter = +<diag/espnow_tx/>

[env:diag_mic]
extends = esp32_diag
build_src_filter = +<diag/mic/>

[env:diag_amp]
extends = esp32_diag
build_src_filter = +<diag/amp/>

[env:diag_audio_loopback]
extends = esp32_diag
build_src_filter = +<diag/audio_loopback/>

[env:diag_logic]
extends = esp32_diag
build_src_filter = +<diag/logic/>

[env:diag_espnow_rx_led]
extends = esp8266_diag
build_src_filter = +<diag/espnow_rx_led/>

[env:diag_chime_buzzer]
extends = esp8266_diag
build_src_filter = +<diag/chime_buzzer/>
